$schema: "http://json-schema.org/draft-07/schema#"
title: rider_settings
version: 0.1.0
type: object
required:
  - id
  - name
  - version
  - status
  - safety
properties:
  id:
    type: string
  name:
    type: string
  version:
    type: string
    pattern: "^\\d+\\.\\d+\\.\\d+$"
  status:
    type: string
    enum: [stub, active, deprecated]
  description:
    type: string
  safety:
    type: object
    required: [allow_destructive, require_confirmation]
    properties:
      allow_destructive:
        type: boolean
      require_confirmation:
        type: boolean
      max_scope_level:
        type: integer
        minimum: 0
        maximum: 4
  autonomy:
    type: object
    properties:
      allowed_actions:
        type: array
        items:
          type: string
      blocked_actions:
        type: array
        items:
          type: string
  prompts:
    type: object
    properties:
      self_review_required:
        type: boolean
      max_followups:
        type: integer
        minimum: 0
  notes:
    type: array
    items:
      type: string
additionalProperties: false
