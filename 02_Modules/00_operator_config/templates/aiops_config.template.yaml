version: 0.2.1
# Machine-local config template. Copy to .ai_ops/local/config.yaml and fill in.
# This file is committed as a template. The populated copy is gitignored.
# Populated by /ai_ops_setup; can also be edited manually.
#
# VALIDATION: Validate customization configs with 00_Admin/scripts/op_validate_config.py.

# --- Personal / machine-specific settings ---

modality:
  # AI surface this machine uses. Set by /ai_ops_setup.
  active_surface: null  # codex_cli | claude_code | claude_app | remote_control | github_copilot | cursor | gemini_cli | other
  # remote_control: claude_code session reachable from multiple devices; treated as claude_code for install purposes.
  installation_target: none  # skills | commands | both | none
  # claude_app is instructions-only; keep installation_target as none.
  # claude_app also implies artifact-driven execution guidance rather than
  # installed skill discovery or runtime-enforced delegation controls.
  confirmed_at: null  # ISO 8601 timestamp

workspace:
  # Repos this machine writes to. Path is relative to workspace_root.
  # sandbox_dir defaults to "90_Sandbox" if omitted.
  # Example:
  # work_repos:
  #   - path: my_project/
  #     sandbox_dir: 90_Sandbox
  work_repos: []
  resource_repos: []

# --- Shared behavioral settings ---

customizations:
  session_limits:
    max_size_kb: null        # null = no advisory limit; set to a number (KB) to enable
    compacted_context_max_chars: 750  # chars for agent-written ## Compacted Context blocks
  bootstrap_preferences:
    max_read_depth: 2
    allow_deepening_on_mismatch: true
  profile_layering:
    # Example: C:/Users/you/.ai_ops/profiles/default.yaml
    global_profile_path: null
    # Example: .ai_ops/local/config.yaml
    repo_overrides_path: .ai_ops/local/config.yaml
  model_capabilities:
    declaration_source: user_declared  # user_declared | imported
    # Example: claude-sonnet-4-6
    default_model: null
    # Use one entry per model/surface pair available to the user.
    # reasoning_level: low | medium | high | maximum  (see AGENTS.md §AI Model Level Reference)
    available_models: []
    # Operator model-to-level binding. Maps a concrete model ID to an ai_ops reasoning level
    # (1=low, 2=medium, 3=high, 4=maximum). Used by /customize and referenced at runtime to
    # resolve workbook model_profile level-based references (high/standard/fast) to model IDs.
    # See AGENTS.md §AI Model Level Reference for level definitions.
    # Example:
    # model_level_map:
    #   claude-opus-4-6: 4        # Level 4 — maximum reasoning
    #   claude-sonnet-4-6: 2      # Level 2 — medium (standard workbook default)
    #   claude-haiku-4-5: 1       # Level 1 — low (fast/linter tasks)
    model_level_map: {}
  external_context:
    # Example: 90_Sandbox/ai_external_context/manifest.yaml
    manifest_path: 90_Sandbox/ai_external_context/manifest.yaml
    # Example: 90_Sandbox/ai_external_context
    bundle_root: 90_Sandbox/ai_external_context
    scope: export
    # Example include: ["**/*.md", "**/*.yaml"]
    include_patterns: []
    # Example exclude: ["**/drafts/**"]
    exclude_patterns: []
  validation_policy:
    # Governs which validators/linters apply in governed external repos.
    # ai_ops: prefer ai_ops validators/linters/tools when available.
    # repo_native: use the target repo's configured validators/linters.
    governed_mode: ai_ops  # ai_ops | repo_native
  delegation_preferences:
    # Optional. Controls subagent delegation behavior.
    enhanced_crosscheck:
      # When enabled, /crosscheck spawns a sub-agent at `tier` rather than the current
      # session model. Useful for quality-critical review with a higher-capability model.
      # "Enhanced Crosscheck Mode" — not escalated (no urgency implied), not accelerated
      # (not about speed). It means a more capable reviewer for the crosscheck phase.
      enabled: false       # true | false
      tier: high           # low | medium | high | maximum
  notes:
    # Free-form notes for non-operational preferences or context.
    # Do not treat this section as requirements or executable settings.
    free_form: ""
