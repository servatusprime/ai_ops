name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.11'

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '24'

      - name: Install lint dependencies
        run: |
          pip install pyyaml yamllint ruff
          npm install -g markdownlint-cli

      - name: Verify repo structure map is current
        run: |
          python 00_Admin/scripts/generate_repo_structure.py --repo-root .
          git diff --exit-code -- repo_structure.txt

      - name: Run canonical release-quality gate
        run: python 00_Admin/scripts/run_release_quality_gate.py
