name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install lint dependencies
        run: |
          pip install pyyaml yamllint ruff
          npm install -g markdownlint-cli

      - name: Run canonical release-quality gate
        run: python 00_Admin/scripts/run_release_quality_gate.py
