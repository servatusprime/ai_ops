  - id: fw_20260324_01
    title: Option 3 subagent execution context dimension
    domain: governance
    target_repo: ai_ops
    source_workbook: >-
      90_Sandbox/ai_workbooks/wb_health_and_remediation_01_2026-03-23/wb_health_and_remediation_01.md
    proposed_workbook: null
    scope: >-
      Option 3 (Section Placement Audit) applies the axes rule
      (governance upstream, execution downstream) as a purely topological
      evaluation without considering whether the content's consumers are
      AI subagents operating at execution time with narrow context. For
      templates and runbooks consumed directly by subagents, moving
      guidance content to a guide requires a follow-on read that may not
      occur — increasing brittleness rather than improving structure.
      Deliverables: (1) Add a "subagent execution context" evaluation
      question to rb_repo_health_review.md §3.7 Option 3 protocol:
      "Is this content needed by a subagent at fill-out/execution time
      without a separate guide lookup? If yes, annotate as
      move_reliability_cost: high before recommending downstream move."
      (2) Refine placement verdict taxonomy: distinguish tutorial/teaching
      content (safe to move downstream) from operational reminders and
      normative safety rules (subagent-local value — keep or annotate).
      (3) Update audit CSV schema with optional consumer_context field
      (agent | human | both) and move_reliability_cost (low | medium | high).
    priority: high
    benefit: high
    effort: s
    readiness: ready
    risk_if_deferred: medium
    activation_trigger: >-
      Next Option 3 run or template/runbook editing session. The design
      is fully established from wb_health_and_remediation_01 Phase 4
      analysis (2026-03-24). Ready to execute immediately.
    next_review: 2026-06-01
    status: planned
    owner: ai_ops
    created: 2026-03-24
    compacted_context:
      source: >-
        wb_health_and_remediation_01 Phase 4 gate assessment (2026-03-24)
      note: >-
        Surfaced when evaluating Lane B (template scaffold purge) scope.
        The axes rule treats all downstream moves as structurally
        equivalent, but AI subagents have a different cost profile for
        content indirection than human authors. Tutorial content is safe
        to move; normative reminders and operational guards at
        execution-time are not. This distinction needs to be a first-class
        evaluation dimension in Option 3.
    notes: >-
      High priority. Affects every future Option 3 run and all template
      editing decisions. Design is settled; only implementation remains.

