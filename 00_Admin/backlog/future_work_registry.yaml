  - id: fw_20260319_01
    title: Draft artifact authority guidance
    domain: governance
    target_repo: ai_ops
    source_workbook: >-
      90_Sandbox/ai_workbooks/wb_native_subagent_runtime_delivery_01_2026-03-19/wb_native_subagent_runtime_delivery_01.md
    proposed_workbook: null
    scope: >-
      Clarify when working-tree ai_ops artifacts (agent files, workflow docs)
      are authoritative vs. only committed versions. Especially relevant when
      a workbook uses the changed agent files as dogfood during execution:
      if the changed files are in the working tree but not committed, an agent
      bootstrapping off the committed state will use stale definitions.
      Deliverables: a governance note in AGENTS.md or a spec section defining
      the working-tree vs. committed authority boundary; integration into
      workbook pre-flight checklist where dogfood execution is expected.
    priority: medium
    benefit: medium
    effort: s
    readiness: partial
    risk_if_deferred: medium
    activation_trigger: >-
      Next workbook where dogfood execution is expected (agent files or
      workflow docs are changed in the same bundle that will use them), or
      when an operator reports confusion about which file version was active
      during an execution.
    next_review: 2026-06-01
    status: planned
    owner: ai_ops
    created: 2026-03-23
    compacted_context:
      source: >-
        wb_native_subagent_runtime_delivery_01 Accumulated Seeds —
        Directly WB-D Relevant (2026-03-19)
      note: >-
        Surfaced during planning for WB-D: workbook used changed agent files
        as dogfood but authority boundary (working-tree vs. committed) was
        not documented. Directly WB-D relevant; carried forward as future work
        after WB-D scope was locked.
    notes: >-
      Medium risk if deferred because dogfood workbooks are common and the
      confusion risk is real. Small effort — a spec note and pre-flight
      checklist item.

  - id: fw_20260319_07
    title: Git-status discovery friction
    domain: tooling
    target_repo: ai_ops
    source_workbook: >-
      90_Sandbox/ai_workbooks/wb_native_subagent_runtime_delivery_01_2026-03-19/wb_native_subagent_runtime_delivery_01.md
    proposed_workbook: null
    scope: >-
      Find a lighter worktree discovery path for narrow-lane execution.
      Broad git status output (worktree noise, warnings, untracked files
      across the whole repo) can obscure the useful execution signal when
      an agent is working in a narrow lane touching only a small file set.
      Deliverables: a targeted git-status pattern or wrapper that scopes
      discovery to the active work paths; optional integration into workflow
      pre-flight steps.
    priority: low
    benefit: low
    effort: s
    readiness: deferred
    risk_if_deferred: low
    activation_trigger: >-
