      spec gaps are flagged during onboarding or a governed-repo setup.
    next_review: null
    status: complete
    owner: ai_ops
    created: 2026-03-23
    compacted_context:
      source: >-
        wb_agent_architecture_evolution_01 EA-07 model-agnostic spec
        (2026-03-23); workbook templates updated to level-based model_profile
      note: >-
        EA-07 updated workbook templates to use level-based model_profile
        references (high/standard/fast) instead of hard-coded model IDs.
        Confirmed complete 2026-03-24 in wb_health_and_remediation_01:
        model_level_map implemented in aiops_config.template.yaml, AGENTS.md
        §AI Model Level Reference, customize.md Step 4, and
