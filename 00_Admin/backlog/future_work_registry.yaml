  - id: fw_20260312_01
    title: Refresh GitHub Actions SHA pins in lint.yml
    domain: operations
    target_repo: ai_ops
    source_workbook: null
    proposed_workbook: null
    scope: >-
      When a new major or minor version of any pinned action is released,
      update the full commit SHA in `.github/workflows/lint.yml` to match.
      Current pins (as of 2026-03-12): actions/checkout@v6, actions/setup-python@v6,
      actions/setup-node@v6. To resolve: run
      `git ls-remote https://github.com/actions/<name> refs/tags/vN`
      and update both the SHA and the inline version comment. This is a
      recurring maintenance task — not a one-time fix.
    priority: medium
    benefit: medium
    effort: xs
    readiness: ready
    risk_if_deferred: medium
    activation_trigger: >-
      A new version tag (e.g. v7) is released for any pinned action, or a
      security advisory references a pinned SHA that must be rotated.
    next_review: 2026-06-01
    status: planned
    owner: ai_ops
    created: 2026-03-12
    compacted_context:
      source: Requestor request 2026-03-12; initial SHA pinning applied to lint.yml
      note: >-
        SHA pinning addresses supply-chain security recommendation for public
        repos. Pinning is the one-time fix; version bumps are the recurring
        maintenance. Command to resolve a tag:
        git ls-remote https://github.com/actions/<name> refs/tags/vN
    notes: >-
      Recurring maintenance. Low effort per bump — single file, 1-3 line edits.
      Consider automating with Dependabot once repo is public.

