  - id: fw_20260319_01
    title: Draft artifact authority guidance
    domain: governance
    target_repo: ai_ops
    source_workbook: >-
      90_Sandbox/ai_workbooks/wb_native_subagent_runtime_delivery_01_2026-03-19/wb_native_subagent_runtime_delivery_01.md
    proposed_workbook: null
    scope: >-
      Clarify when working-tree ai_ops artifacts (agent files, workflow docs)
      are authoritative vs. only committed versions. Especially relevant when
      a workbook uses the changed agent files as dogfood during execution:
      if the changed files are in the working tree but not committed, an agent
      bootstrapping off the committed state will use stale definitions.
      Deliverables: a governance note in AGENTS.md or a spec section defining
      the working-tree vs. committed authority boundary; integration into
      workbook pre-flight checklist where dogfood execution is expected.
