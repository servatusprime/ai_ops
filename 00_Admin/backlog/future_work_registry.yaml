  - id: fw_20260323_01
    title: Director Topology implementation
    domain: governance
    target_repo: ai_ops
    source_workbook: >-
      90_Sandbox/ai_workbooks/wb_agent_architecture_evolution_01_2026-03-22/wb_agent_architecture_evolution_01.md
    proposed_workbook: null
    scope: >-
      Implement the Director topology: a multi-agent mode where the primary
      session agent spawns Coordinator subagents per project. Requires:
      (1) Coordinator native agent file — DQ-12 revisit; currently absent by
      design because Coordinator is the primary agent, not a subagent; Director
      topology changes this assumption for the spawned Coordinator role;
      (2) delegation contract documenting how the Director hands off scope to
      a Coordinator subagent and what the return contract is;
      (3) AGENTS.md Director topology entry promoted from design note to
      canonical spec;
      (4) spec_subagent_file.md Coordinator section;
      (5) crew config and profile updates in 02_Modules/01_agent_profiles/ if
      Director becomes a named topology preset.
    priority: low
    benefit: medium
    effort: l
    readiness: deferred
    risk_if_deferred: low
    activation_trigger: >-
      Requestor confirms Director topology is needed for a specific use case,
      or multi-project orchestration becomes a recurring operational need.
    next_review: 2026-06-01
    status: planned
    owner: ai_ops
    created: 2026-03-23
    compacted_context:
      source: >-
        wb_agent_architecture_evolution_01 EA-10 design note (2026-03-23);
        DQ-12 revisit identified as prerequisite
      note: >-
        EA-10 documented the Director topology as a design-only note and
        explicitly deferred implementation. DQ-12 must be resolved first:
